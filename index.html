<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공정표</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:#f2f4f7;min-height:100vh}
.wrap{max-width:1400px;margin:0 auto;padding:16px}
.hero{position:relative;width:100%;height:140px;border-radius:12px;overflow:hidden;margin-bottom:16px;display:flex;align-items:center;justify-content:center}
.hero-bg{position:absolute;inset:0;background:linear-gradient(rgba(20,30,48,0.62),rgba(20,30,48,0.62)),url('https://images.unsplash.com/photo-1631679706909-1844bbd07221?w=1200&q=80&auto=format&fit=crop') center/cover no-repeat;filter:blur(1.5px);transform:scale(1.04)}
.hero-content{position:relative;text-align:center;z-index:1}
.hero-title{font-size:28px;font-weight:500;color:#fff;letter-spacing:0.06em;margin-bottom:3px}
.hero-sub{font-size:11px;color:rgba(255,255,255,0.6);letter-spacing:0.12em}
.sync-bar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:#fff;border-radius:8px;border:0.5px solid #dde3ee;margin-bottom:12px;font-size:12px;color:#666}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0}
.sync-dot.ok{background:#538135}
.sync-dot.ing{background:#E46C0A;animation:pulse 1s infinite}
.sync-dot.err{background:#C00000}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.nav{display:flex;gap:6px;padding:0 0 12px;border-bottom:0.5px solid #dde3ee;margin-bottom:12px;flex-wrap:wrap;justify-content:flex-end}
button{font-size:12px;padding:5px 11px;border-radius:8px;border:0.5px solid #ccc;background:#fff;color:#333;cursor:pointer;font-family:inherit}
button:hover{background:#f0f0f0}
button:active{transform:scale(0.97)}
.btn-accent{background:#1F3864;color:#fff;border-color:#1F3864}
.btn-accent:hover{opacity:0.88;background:#1F3864}
.btn-danger{color:#c00;border-color:#e8b0b0}
.btn-danger:hover{background:#fff0f0}

.month-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.month-label{font-size:14px;font-weight:500;color:#222;min-width:70px}
.month-btn{width:28px;height:28px;padding:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
.tabs::-webkit-scrollbar{height:3px}
.tabs::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}
.tab-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:1.5px solid #dde3ee;background:transparent;color:#888;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit;transition:background .15s,color .15s}
.tab-btn:hover{opacity:0.85}
.tab-btn.on{font-weight:500}
.stats{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.stat{flex:1;min-width:70px;border-radius:8px;padding:8px 10px;text-align:center;border:0.5px solid #dde3ee;background:#f5f7fa}
.stat-n{font-size:20px;font-weight:500;color:#222}
.stat-l{font-size:10px;color:#888;margin-top:1px}
.progress-wrap{margin-bottom:12px;background:#f5f7fa;border-radius:8px;padding:10px 14px;border:0.5px solid #dde3ee}
.progress-label{font-size:11px;color:#888;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.progress-pct{font-size:13px;font-weight:500;color:#222}
.progress-bar-bg{height:8px;background:#dde3ee;border-radius:4px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:4px;transition:width .4s ease;background:linear-gradient(90deg,#2E75B6,#538135)}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.meta-card{background:#f5f7fa;border-radius:8px;padding:7px 10px;border:0.5px solid #dde3ee}
.meta-card.full{grid-column:1/-1}
.meta-label{font-size:10px;color:#888;margin-bottom:2px}
.meta-input{font-size:13px;font-weight:500;color:#222;background:transparent;border:none;outline:none;width:100%;font-family:inherit}
.meta-input:focus{border-bottom:1px solid #7a9cc8}
.meta-textarea{font-size:12px;color:#222;background:transparent;border:none;outline:none;width:100%;font-family:inherit;resize:vertical;min-height:48px;line-height:1.5}
.checklist-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid #f0f0f0}
.checklist-item:last-child{border-bottom:none}
.checklist-cb{width:16px;height:16px;cursor:pointer;flex-shrink:0;accent-color:#538135}
.checklist-text{flex:1;font-size:12px;color:#222;background:transparent;border:none;outline:none;font-family:inherit;line-height:1.5}
.checklist-text:focus{border-bottom:1px solid #b0b8c8}
.checklist-text.done{text-decoration:line-through;color:#aaa}
.checklist-del{width:18px;height:18px;padding:0;font-size:12px;border:none;background:transparent;color:#ddd;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:3px}
.checklist-del:hover{color:#c00;background:#fff0f0}
.checklist-add{display:flex;gap:6px;align-items:center;margin-top:6px}
.checklist-add-input{flex:1;font-size:12px;padding:4px 8px;border-radius:6px;border:1px solid #dde3ee;background:transparent;color:#222;font-family:inherit;outline:none}
.checklist-add-input:focus{border-color:#b0b8c8}
.picker-bar{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.picker-label{font-size:11px;color:#888;white-space:nowrap}
.swatch{width:22px;height:22px;border-radius:5px;cursor:pointer;border:2px solid transparent;flex-shrink:0;transition:transform .1s}
.swatch:hover{transform:scale(1.15)}
.swatch.on{border-color:#222;transform:scale(1.15)}
.swatch-eraser{background:#fff;border:0.5px solid #ccc!important;font-size:11px;display:flex;align-items:center;justify-content:center;color:#888}
.tbl-wrap{overflow-x:auto;margin-bottom:2px;width:100%}
.tbl-wrap::-webkit-scrollbar{height:4px}
.tbl-wrap::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}
table{border-collapse:collapse;width:100%;min-width:500px}
th{border:1.5px solid #b0b8c8;padding:0;text-align:center;font-size:11px}
.h-dow{height:22px;font-size:10px;font-weight:500;background:#dce8f5;color:#1a4a7a}
.h-dow.sat{background:#FFF3CD;color:#7a5a00}
.h-dow.sun,.h-dow.hol{background:#FFE0E0;color:#a00}
.h-date{height:18px;font-size:10px;background:#eef2f7;color:#666}
.h-date.we{background:#ebebeb}
.h-date.hol{background:#ffe8e8;color:#c00}
.c-site-h{font-weight:500;font-size:11px;color:#fff;text-align:center;padding:0 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:1.5px solid rgba(0,0,0,0.18)}
.c-proc{text-align:left;padding-left:7px;font-size:11px;overflow:hidden;white-space:nowrap;color:#444;border:1px solid #ccd3df;height:30px;background:#f4f6fa}
.c-proc.stripe{background:#eef1f7}
td.dc,td.dc-locked{border:1px solid #c8d0de;padding:0;text-align:center;font-size:11px;height:30px;background:#fff}
td.dc{cursor:pointer;transition:opacity .12s}
td.dc:hover{opacity:0.65}
td.dc-locked{cursor:default}
td.dc.we,td.dc-locked.we{background:#f0f0f0}
td.dc.stripe{background:#f7f9fc}
td.dc.stripe.we{background:#e9e9e9}
td.dc-locked.stripe{background:#f7f9fc}
td.dc-locked.stripe.we{background:#e9e9e9}
td.dc.painted,td.dc-locked.painted{background:inherit}
tr.divider td{height:5px;background:#dde3ed;border:none}
.proc-panel{border-radius:12px;border:1px solid #c8d0de;padding:10px 12px;margin-bottom:10px;background:#f2f4f7}
.proc-panel-title{font-size:11px;font-weight:500;color:#222;margin-bottom:6px}
.proc-list{display:flex;flex-direction:column;gap:0;margin-bottom:6px;border:1.5px solid #b0b8c8;border-radius:8px;overflow:hidden;max-height:200px;overflow-y:auto}
.proc-row{display:flex;align-items:center;gap:4px;padding:4px 6px;border-bottom:1px solid #dce3ee;background:#fff}
.proc-row:last-child{border-bottom:none}
.proc-row:hover{background:#f4f7fc}
.proc-drag{color:#aab;cursor:grab;font-size:12px;padding:0 1px;user-select:none;flex-shrink:0}
.proc-idx{font-size:10px;color:#bbb;min-width:14px;text-align:right;flex-shrink:0}
.proc-name-input{flex:1;font-size:11px;color:#222;background:transparent;border:none;outline:none;font-family:inherit;padding:1px 3px;border-radius:3px}
.proc-name-input:focus{background:#eef3fc}
.proc-move{width:18px;height:18px;padding:0;font-size:10px;border:1px solid #dce3ee;background:transparent;color:#999;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:3px;flex-shrink:0}
.proc-move:hover{border-color:#b0b8c8;background:#eef2f7;color:#333}
.proc-del{width:18px;height:18px;padding:0;font-size:11px;border:1px solid #e8cece;background:transparent;color:#daa;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:3px;flex-shrink:0}
.proc-del:hover{background:#fff0f0;color:#c00;border-color:#f5b0b0}
.proc-add-row{display:flex;gap:5px;align-items:center;padding:5px 2px 0}
.proc-add-input{flex:1;font-size:11px;padding:4px 8px;border-radius:8px;border:1px solid #b0b8c8;background:#fff;color:#222;font-family:inherit;outline:none}

/* 날짜별 공정 현황 */
.date-summary{background:#fff;border-radius:12px;border:1px solid #c8d0de;padding:12px 14px;margin-bottom:12px}
.date-summary-title{font-size:12px;font-weight:500;color:#222;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.date-summary-title span{font-size:11px;font-weight:400;color:#888}
.date-day-btns{display:flex;gap:4px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px;-webkit-overflow-scrolling:touch}
.date-day-btns::-webkit-scrollbar{height:3px}
.date-day-btns::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}
.day-btn{min-width:36px;height:44px;padding:0 4px;border-radius:8px;border:1px solid #dde3ee;background:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;flex-shrink:0;font-family:inherit;transition:all .15s}
.day-btn:hover{border-color:#7a9cc8;background:#f0f5fc}
.day-btn.selected{border-color:#1F3864;background:#1F3864;color:#fff}
.day-btn.selected .day-dow{color:rgba(255,255,255,0.7)}
.day-btn.we-btn{background:#f5f5f5;border-color:#e0e0e0}
.day-btn.we-btn.selected{background:#1F3864;border-color:#1F3864}
.day-btn.hol-btn{background:#fff5f5;border-color:#f5c0c0}
.day-btn.hol-btn.selected{background:#1F3864;border-color:#1F3864}
.day-btn.has-work{border-color:#7a9cc8;background:#eef4fc}
.day-btn.has-work.selected{background:#1F3864;border-color:#1F3864}
.day-num{font-size:13px;font-weight:500;color:inherit}
.day-dow{font-size:9px;color:#aaa}
.day-dot{width:5px;height:5px;border-radius:50%;background:#2E75B6;margin-top:1px}
.day-btn.selected .day-dot{background:#fff}
.summary-result{min-height:48px}
.summary-empty{font-size:12px;color:#aaa;padding:8px 0;text-align:center}
.summary-site-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:0.5px solid #eee}
.summary-site-row:last-child{border-bottom:none}
.summary-site-badge{font-size:11px;font-weight:500;color:#fff;padding:2px 8px;border-radius:12px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.summary-procs{display:flex;flex-wrap:wrap;gap:4px;flex:1}
.summary-proc-tag{font-size:11px;padding:2px 8px;border-radius:12px;border:1px solid #dde3ee;color:#555;background:#f7f9fc}
.summary-none{font-size:11px;color:#ccc;padding:2px 0}
.theme-section{margin-bottom:12px}
.theme-label{font-size:11px;color:#888;margin-bottom:6px;font-weight:500}
.theme-swatches{display:flex;gap:8px;flex-wrap:wrap}
.theme-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.theme-chip{width:26px;height:26px;border-radius:6px;cursor:pointer;border:2px solid transparent;position:relative;transition:transform .12s}
.theme-chip:hover{transform:scale(1.1)}
.theme-chip.on{border-color:#333;transform:scale(1.1)}
.theme-chip-label{font-size:10px;color:#888;white-space:nowrap}
.notice{font-size:11px;color:#aaa;margin-bottom:8px;padding:5px 10px;border-radius:8px;border-left:3px solid #b0b8c8;background:#f5f7fa}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:flex;align-items:center;justify-content:center}
.modal-box{background:#fff;border-radius:12px;border:0.5px solid #dde3ee;padding:20px;width:90%;max-width:400px}
.modal-title{font-size:14px;font-weight:500;color:#222;margin-bottom:12px}
.field{margin-bottom:8px}
.field label{font-size:11px;color:#888;display:block;margin-bottom:3px}
.field input{width:100%;font-size:12px;padding:6px 9px;border-radius:8px;border:0.5px solid #ccc;background:#fff;color:#222;font-family:inherit;outline:none}
.field input:focus{border-color:#7a9cc8}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.empty-hint{font-size:12px;color:#aaa;padding:20px 0;text-align:center}
.page-container{perspective:1200px}
.page{transform-origin:left center;will-change:transform,opacity}
.page.flip-out-left{animation:flipOutLeft .26s cubic-bezier(.4,0,.2,1) forwards}
.page.flip-out-right{animation:flipOutRight .26s cubic-bezier(.4,0,.2,1) forwards}
.page.flip-in-left{animation:flipInLeft .26s cubic-bezier(.4,0,.2,1) forwards}
.page.flip-in-right{animation:flipInRight .26s cubic-bezier(.4,0,.2,1) forwards}
@keyframes flipOutLeft{0%{transform:rotateY(0) translateX(0);opacity:1}100%{transform:rotateY(-16deg) translateX(-5%) scale(0.97);opacity:0}}
@keyframes flipOutRight{0%{transform:rotateY(0) translateX(0);opacity:1}100%{transform:rotateY(16deg) translateX(5%) scale(0.97);opacity:0}}
@keyframes flipInLeft{0%{transform:rotateY(16deg) translateX(5%) scale(0.97);opacity:0}100%{transform:rotateY(0) translateX(0);opacity:1}}
@keyframes flipInRight{0%{transform:rotateY(-16deg) translateX(-5%) scale(0.97);opacity:0}100%{transform:rotateY(0) translateX(0);opacity:1}}
</style>
</head>
<body>

<!-- 온보딩 화면 -->
<div id="onboarding" style="display:none;min-height:100vh;background:#f2f4f7;font-family:'Malgun Gothic','맑은 고딕',sans-serif"></div>

<div class="wrap" id="wrap" style="display:none">
  <div class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <div class="hero-title">공정표</div>
      <div class="hero-sub">CONSTRUCTION SCHEDULE</div>
    </div>
  </div>
  <div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-text" style="flex:1">연결 중...</span>
  </div>
  <div class="nav">
    <button onclick="goToSettings()" style="font-size:12px;padding:5px 11px;border-radius:8px;border:0.5px solid #ccc;background:transparent;color:#aaa;cursor:pointer;font-family:inherit" id="login-btn">로그인하기</button>
    <button onclick="openAdd()">+ 작업 추가</button>
    <button onclick="manualSave()" id="save-btn" style="font-size:12px;padding:5px 11px;border-radius:8px;border:0.5px solid #538135;background:transparent;color:#538135;cursor:pointer;font-family:inherit">저장하기</button>
  </div>
  <div id="tabs-area"></div>
  <div class="page-container">
    <div class="page" id="page"><div id="root"></div></div>
  </div>
  <div id="modal-area"></div>
</div>

<script>
let SUPABASE_URL='';
let SUPABASE_KEY='';

const SITE_COLORS=["#2E75B6","#C00000","#538135","#7030A0","#E46C0A","#00868A","#C45911","#0070C0","#6B2C91","#375623"];
const PAINT_SWATCHES=["#2E75B6","#C00000","#538135","#7030A0","#E46C0A","#F4C742","#00868A","#E88DBB","#8B5E3C","#1ABC9C"];
const DOW_KR=["월","화","수","목","금","토","일"];
const DEFAULT_PROCS=["","","","",""];
const THEMES=[
  {key:"white",label:"화이트",bg:"#FFFFFF",tblBg:"#FFFFFF",stripe:"#F7F9FC",weBg:"#F0F0F0",procBg:"#F4F6FA",procStripe:"#EEF1F7",border:"#C8D0DE",hdrBg:"#EEF2F7",stat:"#F5F7FA"},
  {key:"warm",label:"웜그레이",bg:"#F5F2EE",tblBg:"#FDFCFB",stripe:"#F0ECE6",weBg:"#E8E4DF",procBg:"#EDE9E4",procStripe:"#E5E0DA",border:"#C8BFB5",hdrBg:"#EAE5DE",stat:"#EDE8E2"},
  {key:"cool",label:"쿨그레이",bg:"#F2F4F7",tblBg:"#F9FAFB",stripe:"#EDF0F5",weBg:"#E4E8EE",procBg:"#E8EBF1",procStripe:"#E0E4EC",border:"#B8C2D0",hdrBg:"#E4E9F0",stat:"#E8ECF2"},
  {key:"slate",label:"슬레이트",bg:"#ECEEF2",tblBg:"#F4F5F8",stripe:"#E4E7ED",weBg:"#D8DCE6",procBg:"#E2E5EB",procStripe:"#D9DCE4",border:"#B0B8C8",hdrBg:"#DEE2EA",stat:"#E2E5EB"},
  {key:"sand",label:"샌드",bg:"#F4F0E8",tblBg:"#FDFCF8",stripe:"#EDE8DC",weBg:"#E4DDD2",procBg:"#EAE4D8",procStripe:"#E2DBD0",border:"#C4B8A8",hdrBg:"#E8E2D4",stat:"#EAE4D8"},
  {key:"charcoal",label:"차콜",bg:"#2C2F36",tblBg:"#353840",stripe:"#3A3D46",weBg:"#2A2D34",procBg:"#32353E",procStripe:"#2E3138",border:"#4A4F5C",hdrBg:"#3A3D46",stat:"#33363F"},
];
const HOLIDAYS={
  "2026-01-01":"신정","2026-01-28":"설날","2026-01-29":"설날","2026-01-30":"설날",
  "2026-03-01":"삼일절","2026-05-05":"어린이날","2026-05-24":"부처님오신날",
  "2026-06-06":"현충일","2026-08-15":"광복절","2026-09-24":"추석","2026-09-25":"추석","2026-09-26":"추석",
  "2026-10-03":"개천절","2026-10-09":"한글날","2026-12-25":"성탄절"
};
function holKey(y,m,d){return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function isHol(y,m,d){return !!HOLIDAYS[holKey(y,m,d)]}
function holName(y,m,d){return HOLIDAYS[holKey(y,m,d)]||''}

let S={
  year:2026,month:4,tab:"all",
  paintColor:PAINT_SWATCHES[0],dragging:false,
  themeKey:"cool",
  sites:[
    {name:"작업 1",addr:"",pw:"",key:"",memo:"",procs:[...DEFAULT_PROCS],newProcName:"",selectedProcs:[],cells:{}},
    {name:"작업 2",addr:"",pw:"",key:"",memo:"",procs:[...DEFAULT_PROCS],newProcName:"",selectedProcs:[],cells:{}},
    {name:"작업 3",addr:"",pw:"",key:"",memo:"",procs:[...DEFAULT_PROCS],newProcName:"",selectedProcs:[],cells:{}},
    {name:"작업 4",addr:"",pw:"",key:"",memo:"",procs:[...DEFAULT_PROCS],newProcName:"",selectedProcs:[],cells:{}},
  ]
};

let saveTimer=null;
let pollingTimer=null;
let lastSavedAt=null;

// ── Supabase 연동 ──────────────────────────
async function dbLoad(){
  // 폴링용 — 데이터만 가져옴
  const res=await fetch(`${SUPABASE_URL}/rest/v1/gongjeong?id=eq.main&select=data,updated_at`,{
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
  });
  return await res.json();
}

async function dbSave(){
  setSyncStatus('ing','저장 중...');
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/gongjeong?id=eq.main`,{
      method:'PATCH',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({data:S,updated_at:new Date().toISOString()})
    });
    lastSavedAt=Date.now();
    setSyncStatus('ok','저장 완료 — '+new Date().toLocaleTimeString('ko-KR'));
  }catch(e){setSyncStatus('err','저장 실패');}
}

function persist(){
  clearTimeout(saveTimer);
  if(SUPABASE_URL&&SUPABASE_KEY){
    // Supabase 연결 모드 — 서버에 저장
    saveTimer=setTimeout(()=>dbSave(),800);
  } else {
    // 로컬 모드 — localStorage에 저장
    try{localStorage.setItem('gj_local_data',JSON.stringify(S));}catch(e){}
  }
}

function setSyncStatus(type,msg){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-text');
  if(!dot||!txt)return;
  dot.className='sync-dot '+type;
  txt.textContent=msg;
}

// 30초마다 폴링 (다른 사람이 수정했는지 확인)
function startPolling(){
  pollingTimer=setInterval(async()=>{
    if(Date.now()-(lastSavedAt||0)<3000)return;
    try{
      const rows=await dbLoad();
      if(rows&&rows[0]&&rows[0].data&&rows[0].data.sites){
        const remote=rows[0].data;
        const remoteCount=remote.sites.reduce((a,s)=>a+Object.keys(s.cells).length,0);
        const localCount=S.sites.reduce((a,s)=>a+Object.keys(s.cells).length,0);
        if(remoteCount!==localCount||JSON.stringify(remote.sites)!==JSON.stringify(S.sites)){
          Object.assign(S,remote);
          S.sites.forEach(s=>{if(!s.memo)s.memo='';if(!s.checklist)s.checklist=[];});
          renderAll();
          setSyncStatus('ok','업데이트됨 — '+new Date().toLocaleTimeString('ko-KR'));
        }
      }
    }catch(e){}
  },30000);
}

// ── 유틸 ──────────────────────────────────
function daysInMonth(y,m){return new Date(y,m,0).getDate()}
function getDow(y,m,d){let w=new Date(y,m-1,d).getDay();return w===0?6:w-1}
function isWe(y,m,d){return getDow(y,m,d)>=5}
function ck(si,pi,d){return si+"_"+pi+"_"+S.year+"_"+S.month+"_"+d}
function tabIndex(t){return t==="all"?-1:parseInt(t)}
function calcCellW(){
  const total=document.getElementById('wrap')?document.getElementById('wrap').offsetWidth:900;
  return Math.min(48,Math.max(24,Math.floor((total-200-16)/daysInMonth(S.year,S.month))));
}
function getTheme(){return THEMES.find(t=>t.key===S.themeKey)||THEMES[0]}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function applyTheme(){
  const t=getTheme();const dk=S.themeKey==='charcoal';
  document.getElementById('wrap').style.background=t.bg;
  document.body.style.background=t.bg==='#FFFFFF'?'#f2f4f7':t.bg;
  let el=document.getElementById('ts');
  if(!el){el=document.createElement('style');el.id='ts';document.head.appendChild(el);}
  el.textContent=`
    #wrap .stat{background:${t.stat}}
    #wrap .proc-panel{background:${t.bg};border-color:${t.border}}
    #wrap .proc-row{background:${t.tblBg};border-bottom-color:${t.border}}
    #wrap .proc-row:hover{background:${t.stripe}}
    #wrap .proc-list{border-color:${t.border}}
    #wrap .notice{background:${t.stripe};border-left-color:${t.border}}
    #wrap .progress-wrap{background:${t.stat};border-color:${t.border}}
    #wrap .h-dow:not(.sat):not(.sun):not(.hol){background:${t.hdrBg};color:${dk?'#aac4e0':'#1a4a7a'}}
    #wrap .h-date:not(.we):not(.hol){background:${t.hdrBg};color:${dk?'#aaa':'#666'}}
    #wrap .h-date.we{background:${t.weBg}}
    #wrap th{border-color:${t.border}}
    #wrap .c-proc{background:${t.procBg};border-color:${t.border};color:${dk?'#ccc':'#444'}}
    #wrap .c-proc.stripe{background:${t.procStripe}}
    #wrap td.dc,#wrap td.dc-locked{border-color:${t.border}}
    #wrap td.dc{background:${t.tblBg}}
    #wrap td.dc-locked{background:${t.tblBg}}
    #wrap td.dc.stripe,#wrap td.dc-locked.stripe{background:${t.stripe}}
    #wrap td.dc.we,#wrap td.dc-locked.we{background:${t.weBg}}
    #wrap td.dc.stripe.we,#wrap td.dc-locked.stripe.we{background:${t.weBg}}
    #wrap tr.divider td{background:${t.border}}
    #wrap .proc-name-input,#wrap .meta-input,#wrap .meta-textarea{color:${dk?'#e0e0e0':'#222'}}
    #wrap .stat-n,#wrap .month-label,#wrap .progress-pct{color:${dk?'#e8e8e8':'#222'}}
    #wrap .stat-l,#wrap .progress-label,#wrap .picker-label,#wrap .meta-label{color:${dk?'#888':'#888'}}
    #wrap .meta-card{background:${t.stat};border-color:${t.border}}
    #wrap .sync-bar{background:${t.tblBg};border-color:${t.border};color:${dk?'#aaa':'#666'}}
  `;
}

// ── 렌더 ──────────────────────────────────
function renderAll(){
  // 포커스된 입력창 값 보존
  const focused=document.activeElement;
  const focusedId=focused?focused.id:'';
  const focusedValue=focused?focused.value:'';
  const focusedClass=focused?focused.className:'';

  const scrollMap=[];
  document.querySelectorAll('.tbl-wrap').forEach(el=>scrollMap.push(el.scrollLeft));
  renderTabs();
  document.getElementById('root').innerHTML=renderMain();
  attachEvents();attachProcDrag();applyTheme();
  document.querySelectorAll('.tbl-wrap').forEach((el,i)=>{
    if(scrollMap[i])el.scrollLeft=scrollMap[i];
  });
  const loginBtn=document.getElementById('login-btn');
  if(loginBtn){
    if(SUPABASE_URL&&SUPABASE_KEY){
      loginBtn.textContent='로그아웃';
      loginBtn.style.color='#c00';
      loginBtn.style.borderColor='#e8cece';
    } else {
      loginBtn.textContent='로그인하기';
      loginBtn.style.color='#aaa';
      loginBtn.style.borderColor='#ccc';
    }
  }
  // 포커스된 입력창 복원
  if(focusedId){
    const el=document.getElementById(focusedId);
    if(el){el.focus();el.value=focusedValue;}
  } else if(focusedClass&&focusedClass.includes('proc-name-input')){
    // proc-name-input은 id가 없으므로 값으로 찾기
    document.querySelectorAll('.proc-name-input').forEach(el=>{
      if(el.value===focusedValue)el.focus();
    });
  }
}

function setTab(newTab){
  if(newTab===S.tab)return;
  const goRight=tabIndex(newTab)>tabIndex(S.tab);
  S.tab=newTab;
  // 프로젝트 탭이면 해당 색상으로 자동 설정
  if(newTab!=='all'){
    S.paintColor=SITE_COLORS[parseInt(newTab)%SITE_COLORS.length];
  }
  renderTabs();
  const page=document.getElementById('page');
  page.classList.add(goRight?'flip-out-left':'flip-out-right');
  setTimeout(()=>{
    document.getElementById('root').innerHTML=renderMain();
    attachEvents();attachProcDrag();applyTheme();
    page.classList.remove('flip-out-left','flip-out-right');
    page.classList.add(goRight?'flip-in-left':'flip-in-right');
    setTimeout(()=>page.classList.remove('flip-in-left','flip-in-right'),280);
  },240);
}

function renderTabs(){
  let h=`<div class="tabs">`;
  const allOn=S.tab==='all';
  h+=`<button class="tab-btn${allOn?' on':''}" onclick="setTab('all')" style="${allOn?'background:#1F3864;color:#fff;border-color:#1F3864':'border-color:#1F3864;color:#1F3864'}">통합</button>`;
  S.sites.forEach((s,i)=>{
    const on=S.tab===String(i);
    const sc=SITE_COLORS[i%SITE_COLORS.length];
    h+=`<button class="tab-btn${on?' on':''}" onclick="setTab(${i})" style="${on?`background:${sc};color:#fff;border-color:${sc}`:`border-color:${sc};color:${sc}`}">${esc(s.name)}</button>`;
  });
  h+=`</div>`;
  document.getElementById('tabs-area').innerHTML=h;
}

function getTodayWork(si){
  const today=new Date();
  const y=today.getFullYear(),m=today.getMonth()+1,d=today.getDate();
  // 현재 보고 있는 달이 이번 달인지 확인
  if(S.year!==y||S.month!==m)return null;
  const works=[];
  S.sites[si].procs.forEach((proc,pi)=>{
    if(proc&&S.sites[si].cells[ck(si,pi,d)])works.push(proc);
  });
  return {d,works};
}

let viewDay=null; // null이면 오늘

function renderTodayAll(y,m){
  const today=new Date();
  const isThisMonth=(y===today.getFullYear()&&m===today.getMonth()+1);
  const d=viewDay||(isThisMonth?today.getDate():1);
  const days=daysInMonth(y,m);
  const dw=['일','월','화','수','목','금','토'][new Date(y,m-1,d).getDay()];
  const isToday=isThisMonth&&d===today.getDate();

  let hasAny=false;
  let rows='';
  S.sites.forEach((s,si)=>{
    const sc=SITE_COLORS[si%SITE_COLORS.length];
    const works=[];
    s.procs.forEach((proc,pi)=>{
      if(proc&&s.cells[ck(si,pi,d)])works.push(proc);
    });
    if(works.length>0){
      hasAny=true;
      rows+=`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid #eee;flex-wrap:wrap">
        <span style="font-size:11px;font-weight:500;color:#fff;background:${sc};padding:2px 10px;border-radius:20px;flex-shrink:0">${esc(s.name)}</span>
        <div style="display:flex;flex-wrap:wrap;gap:4px">
          ${works.map(w=>`<span style="font-size:11px;padding:2px 8px;border-radius:20px;background:${sc}22;border:1px solid ${sc}55;color:${sc}">${esc(w)}</span>`).join('')}
        </div>
      </div>`;
    }
  });

  return `<div class="progress-wrap">
    <div style="display:flex;align-items:flex-start;gap:14px">
      <div style="flex-shrink:0;border-right:2px solid #e0e4ed;padding-right:14px;min-width:64px">
        <div style="font-size:11px;color:#888;margin-bottom:4px">${isToday?'오늘 일정':'일정 보기'}</div>
        <div style="font-size:22px;font-weight:500;color:#222;line-height:1">${m}/${d}</div>
        <div style="font-size:11px;color:#888;margin-top:2px">${dw}요일</div>
        <div style="display:flex;gap:4px;margin-top:8px">
          <button onclick="shiftViewDay(-1)" style="width:24px;height:24px;padding:0;border-radius:4px;border:1px solid #dde3ee;background:transparent;color:#888;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center">&#8592;</button>
          ${isToday?'':'<button onclick="shiftViewDay(0)" style="font-size:9px;padding:2px 5px;border-radius:4px;border:1px solid #dde3ee;background:transparent;color:#888;cursor:pointer">오늘</button>'}
          <button onclick="shiftViewDay(1)" style="width:24px;height:24px;padding:0;border-radius:4px;border:1px solid #dde3ee;background:transparent;color:#888;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center">&#8594;</button>
        </div>
      </div>
      <div style="flex:1;padding-top:2px">
        ${hasAny?rows:`<div style="font-size:12px;color:#aaa;padding-top:6px">이 날 등록된 일정이 없어요</div>`}
      </div>
    </div>
  </div>`;
}

function shiftViewDay(dir){
  const today=new Date();
  const isThisMonth=(S.year===today.getFullYear()&&S.month===today.getMonth()+1);
  const current=viewDay||(isThisMonth?today.getDate():1);
  const days=daysInMonth(S.year,S.month);
  if(dir===0){
    viewDay=null; // 오늘로 리셋
  } else {
    const next=current+dir;
    if(next<1||next>days)return;
    viewDay=next;
  }
  // 일정 패널만 업데이트
  const panel=document.querySelector('.progress-wrap');
  if(panel){
    const tmp=document.createElement('div');
    tmp.innerHTML=renderTodayAll(S.year,S.month);
    panel.outerHTML=tmp.firstElementChild.outerHTML;
  }
}

function getChecklist(si){
  const s=S.sites[si];
  if(!s.checklist||!Array.isArray(s.checklist))s.checklist=[];
  return s.checklist;
}

function renderChecklist(si){
  const list=getChecklist(si);
  let h=`<div id="checklist-${si}">`;
  if(list.length===0){
    h+=`<div style="font-size:12px;color:#bbb;padding:4px 0">아래에서 항목을 추가해보세요</div>`;
  } else {
    list.forEach((item,i)=>{
      h+=`<div class="checklist-item">
        <input type="checkbox" class="checklist-cb" ${item.checked?'checked':''} onchange="toggleCheck(${si},${i},this.checked)">
        <input type="text" class="checklist-text${item.checked?' done':''}" value="${esc(item.text)}"
          oninput="updateCheckText(${si},${i},this.value)"
          onkeydown="if(event.key==='Enter'){event.preventDefault();focusNextCheck(${si},${i})}">
        <button class="checklist-del" onclick="deleteCheck(${si},${i})">✕</button>
      </div>`;
    });
  }
  h+=`<div class="checklist-add">
    <input class="checklist-add-input" id="check-add-${si}" placeholder="+ 새 항목 추가 (Enter)"
      onkeydown="if(event.key==='Enter')addCheck(${si},this.value,this)">
    <button class="btn-accent" onclick="addCheck(${si},document.getElementById('check-add-${si}').value,document.getElementById('check-add-${si}'))">추가</button>
  </div>`;
  return h+`</div>`;
}

function toggleCheck(si,i,checked){
  S.sites[si].checklist[i].checked=checked;
  // 취소선만 토글 (전체 렌더 X)
  const inputs=document.querySelectorAll(`#checklist-${si} .checklist-text`);
  if(inputs[i])inputs[i].className='checklist-text'+(checked?' done':'');
  persist();
}

function updateCheckText(si,i,val){
  S.sites[si].checklist[i].text=val;
  clearTimeout(window._checkTimer);
  window._checkTimer=setTimeout(()=>persist(),500);
}

function addCheck(si,val,inputEl){
  const text=(val||'').trim();
  if(!text){if(inputEl)inputEl.focus();return;}
  if(!S.sites[si].checklist)S.sites[si].checklist=[];
  S.sites[si].checklist.push({text,checked:false});
  if(inputEl)inputEl.value='';
  persist();
  const container=document.getElementById(`checklist-${si}`);
  if(container){
    const tmp=document.createElement('div');
    tmp.innerHTML=renderChecklist(si);
    container.outerHTML=tmp.innerHTML;
  }
  // 추가 후 입력창 포커스 유지
  setTimeout(()=>{
    const input=document.getElementById(`check-add-${si}`);
    if(input)input.focus();
  },50);
}

function deleteCheck(si,i){
  S.sites[si].checklist.splice(i,1);
  persist();
  const container=document.getElementById(`checklist-${si}`);
  if(container){
    const tmp=document.createElement('div');
    tmp.innerHTML=renderChecklist(si);
    container.outerHTML=tmp.innerHTML;
  }
}

function focusNextCheck(si,i){
  const inputs=document.querySelectorAll(`#checklist-${si} .checklist-text`);
  if(inputs[i+1])inputs[i+1].focus();
  else document.getElementById(`check-add-${si}`).focus();
}

function renderMain(){
  const y=S.year,m=S.month,days=daysInMonth(y,m),cw=calcCellW();
  let totalFilled=0;S.sites.forEach(s=>Object.values(s.cells).forEach(c=>{if(c)totalFilled++;}));
  let h=`<div>`;
  h+=`<div class="month-bar">
    <button class="month-btn" onclick="changeMonth(-1)">&#8592;</button>
    <span class="month-label">${y}년 ${m}월</span>
    <button class="month-btn" onclick="changeMonth(1)">&#8594;</button>
  </div>`;
  if(S.tab==="all"){
    const activeDays=new Set();
    S.sites.forEach(s=>Object.keys(s.cells).forEach(k=>{if(s.cells[k]){const p=k.split('_');if(parseInt(p[2])===S.year&&parseInt(p[3])===S.month)activeDays.add(p[4]);}}));
    h+=`<div class="stats">
      <div class="stat"><div class="stat-n">${S.sites.length}</div><div class="stat-l">진행 작업</div></div>
      <div class="stat"><div class="stat-n">${totalFilled}</div><div class="stat-l">작업 기록</div></div>
      <div class="stat"><div class="stat-n">${activeDays.size}일</div><div class="stat-l">작업 있는 날</div></div>
      <div class="stat"><div class="stat-n">${days}일</div><div class="stat-l">${m}월 전체</div></div>
    </div>`;
    h+=renderThemePicker();
    h+=renderTodayAll(y,m);
    h+=renderDateSummary(y,m,days);
    h+=`<div class="notice">통합 시트는 읽기 전용입니다. 세부 작업 입력은 각 작업 탭에서 해주세요.</div>`;
    h+=S.sites.length===0?`<div class="empty-hint">현장을 추가해 주세요</div>`:renderAllTable(y,m,days,cw);
  } else {
    const si=parseInt(S.tab),s=S.sites[si],sc=SITE_COLORS[si%SITE_COLORS.length];
    h+=`<div class="meta-grid">
      <div class="meta-card full" style="border-left:3px solid ${sc}">
        <div class="meta-label">프로젝트명</div>
        <input class="meta-input" style="font-size:14px" value="${esc(s.name)}" placeholder="프로젝트명" onchange="updateMeta(${si},'name',this.value)" oninput="updateTabName(${si},this.value)">
      </div>
      <div class="meta-card"><div class="meta-label">장소 / 주소</div><input class="meta-input" value="${esc(s.addr)}" placeholder="입력 (선택사항)" onchange="updateMeta(${si},'addr',this.value)"></div>
      <div class="meta-card"><div class="meta-label">비밀번호</div><input class="meta-input" value="${esc(s.pw)}" placeholder="없음" onchange="updateMeta(${si},'pw',this.value)"></div>
      <div class="meta-card full">
        <div class="meta-label" style="margin-bottom:6px">메모 / 체크리스트</div>
        ${renderChecklist(si)}
      </div>
    </div>`;
    h+=renderSiteProcPanel(si);
    h+=renderColorPicker(si)+renderSiteTable(si,y,m,days,cw);
    h+=`<div style="margin-top:10px;text-align:right"><button class="btn-danger" onclick="deleteSite(${si})">작업 삭제</button></div>`;
  }
  return h+`</div>`;
}

let selectedDay=null;

function renderDateSummary(y,m,days){
  if(S.sites.length===0)return'';
  const dow=DOW_KR;
  // 날짜 버튼들
  let h=`<div class="date-summary">
    <div class="date-summary-title">${m}월 날짜별 공정 현황 <span>날짜를 클릭하면 해당 일의 공정을 확인할 수 있어요</span></div>
    <div class="date-day-btns">`;
  for(let d=1;d<=days;d++){
    const dw=getDow(y,m,d);
    const we=dw>=5;const hol=isHol(y,m,d);
    const sel=selectedDay===d;
    // 이 날에 공정이 있는지 확인
    let hasWork=false;
    S.sites.forEach((s,si)=>{s.procs.forEach((_,pi)=>{if(s.cells[ck(si,pi,d)])hasWork=true;});});
    const weClass=hol?'hol-btn':we?'we-btn':'';
    const workClass=hasWork&&!sel?'has-work':'';
    const selClass=sel?'selected':'';
    const dowColor=dw===6?'color:#a00':dw===5?'color:#7a5a00':'';
    h+=`<button class="day-btn ${weClass} ${workClass} ${selClass}" onclick="selectDay(${d})">
      <span class="day-num">${d}</span>
      <span class="day-dow" style="${sel?'':dowColor}">${dow[dw]}</span>
      ${hasWork?`<span class="day-dot"></span>`:''}
    </button>`;
  }
  h+=`</div><div class="summary-result" id="summary-result">`;

  if(selectedDay){
    const d=selectedDay;
    const dw=getDow(y,m,d);
    const holN=holName(y,m,d);
    const dayLabel=`${m}월 ${d}일 (${DOW_KR[dw]}${holN?' · '+holN:''})`;
    let anyWork=false;
    S.sites.forEach((s,si)=>{
      const sc=SITE_COLORS[si%SITE_COLORS.length];
      const workedProcs=[];
      s.procs.forEach((proc,pi)=>{if(s.cells[ck(si,pi,d)])workedProcs.push({proc,color:s.cells[ck(si,pi,d)]});});
      if(workedProcs.length>0){
        anyWork=true;
        h+=`<div class="summary-site-row">
          <span class="summary-site-badge" style="background:${sc}">${esc(s.name)}</span>
          <div class="summary-procs">`;
        workedProcs.forEach(({proc,color})=>{
          h+=`<span class="summary-proc-tag" style="border-color:${color};background:${color}22;color:#333">${esc(proc)}</span>`;
        });
        h+=`</div></div>`;
      }
    });
    if(!anyWork) h+=`<div class="summary-empty">${dayLabel} — 등록된 공정이 없습니다</div>`;
  } else {
    h+=`<div class="summary-empty">날짜를 선택하면 해당 일의 공정 현황이 표시됩니다</div>`;
  }
  h+=`</div></div>`;
  return h;
}

function selectDay(d){
  selectedDay=selectedDay===d?null:d;
  renderAll();
}

function renderThemePicker(){
  let h=`<div class="theme-section"><div class="theme-label">배경 테마</div><div class="theme-swatches">`;
  THEMES.forEach(t=>{
    const on=S.themeKey===t.key;
    h+=`<div class="theme-item"><div class="theme-chip${on?' on':''}" style="background:${t.bg};border-color:${on?'#333':'#ccc'}" onclick="setTheme('${t.key}')">
      ${on?`<span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:${t.key==='charcoal'?'#fff':'#333'}">&#10003;</span>`:''}
    </div><div class="theme-chip-label">${t.label}</div></div>`;
  });
  return h+`</div></div>`;
}

function renderSiteProcPanel(si){
  const s=S.sites[si];
  const sc=SITE_COLORS[si%SITE_COLORS.length];
  const anySelected=s.selectedProcs&&s.selectedProcs.length>0;
  const allSelected=s.selectedProcs&&s.selectedProcs.length===s.procs.length;

  let btnHtml='';
  if(s.selectMode){
    btnHtml+=`<button onclick="toggleSelectAll(${si})" style="font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid #b0b8c8;background:transparent;color:#666;cursor:pointer;font-family:inherit">전체 선택</button>`;
    if(anySelected){

function renderAllTable(y,m,days,cw){

  for(let d=1;d<=days;d++){const dw=getDow(y,m,d);const hol=isHol(y,m,d);const cls=hol?'hol':dw===6?'sun':dw===5?'sat':'';h+=`<th class="h-dow ${cls}" style="${colStyle(cw)}" title="${holName(y,m,d)}">${DOW_KR[dw]}</th>`;}
  h+=`</tr><tr>`;
  for(let d=1;d<=days;d++){const we=isWe(y,m,d);const hol=isHol(y,m,d);h+=`<th class="h-date${hol?' hol':we?' we':''}" style="${colStyle(cw)}" title="${holName(y,m,d)}">${d}</th>`;}

      h+=`<td class="c-proc${stripe?' stripe':''}" style="width:${pw}px">${esc(proc)}</td>`;

    el.addEventListener('mouseover',e=>{if(S.dragging)paint(e.currentTarget);});
    el.addEventListener('touchstart',e=>{S.dragging=true;paint(e.currentTarget);e.preventDefault();},{passive:false});
    el.addEventListener('touchmove',e=>{
      e.preventDefault();
      const t=e.touches[0];
      const hit=document.elementFromPoint(t.clientX,t.clientY);
      if(hit&&hit.classList.contains('dc'))paint(hit);

function paint(el){
  const si=+el.dataset.si,pi=+el.dataset.pi,d=+el.dataset.d,k=ck(si,pi,d);
  if(S.paintColor===''){
    delete S.sites[si].cells[k];
    el.style.background='';
    el.classList.remove('painted');
    // 주말/공휴일이면 we 클래스 복구, 줄무늬도 복구
    const isWeekend=isWe(S.year,S.month,d)||isHol(S.year,S.month,d);
    const isStripe=S.tab!=='all'?pi%2===1:si%2===1;
    if(isWeekend)el.classList.add('we');
    if(isStripe)el.classList.add('stripe');
  } else {
    S.sites[si].cells[k]=S.paintColor;
    el.style.background=S.paintColor;
    el.classList.add('painted');
    el.classList.remove('we','stripe');
  }
  persist();
}

function toggleProcSelect(si,pi,checked){
  if(!S.sites[si].selectedProcs)S.sites[si].selectedProcs=[];

function toggleSelectAll(si){

function deleteSelected(si){
  const s=S.sites[si];
  if(!s.selectedProcs||s.selectedProcs.length===0)return;
  if(s.procs.length-s.selectedProcs.length<1){alert('작업은 최소 1개 이상 필요합니다.');return;}
  if(!confirm(`선택한 ${s.selectedProcs.length}개 작업을 삭제할까요? 해당 작업의 기록도 모두 지워져요.`))return;
  const toDelete=new Set(s.selectedProcs);
  // 인덱스 높은 것부터 삭제
  const sorted=[...toDelete].sort((a,b)=>b-a);
  sorted.forEach(pi=>{
    const cells=s.cells;
    const nc={};
    Object.entries(cells).forEach(([k,v])=>{
      const p=k.split('_');const ci=parseInt(p[1]);
      if(ci===pi)return;
      if(ci>pi)nc[p[0]+'_'+(ci-1)+'_'+p[2]+'_'+p[3]+'_'+p[4]]=v;
      else nc[k]=v;
    });
    s.cells=nc;
    s.procs.splice(pi,1);
  });
  s.selectedProcs=[];
  persist();renderAll();
}

function deleteAllProcs(si){
  if(!confirm('모든 작업 기록(색칠)을 삭제할까요? 작업 목록은 그대로 유지돼요.'))return;
  S.sites[si].cells={};
  S.sites[si].selectedProcs=[];
  persist();renderAll();
}

function renameSiteProc(si,pi,val,live){
  S.sites[si].procs[pi]=val;
  // 테이블 공정명 실시간 업데이트
  document.querySelectorAll('.c-proc').forEach((el,i)=>{
    if(i===pi)el.textContent=val;
  });
  // 즉시 저장 (타이머 없이)
  clearTimeout(window._renameTimer);
  window._renameTimer=setTimeout(()=>persist(),500);
}
function addSiteProc(si){
  const name=(S.sites[si].newProcName||'').trim();
  if(!name){document.getElementById('proc-add-'+si).focus();return;}
  if(S.sites[si].procs.includes(name)){alert('이미 있는 작업명입니다.');return;}
  S.sites[si].procs.push(name);
  S.sites[si].newProcName='';
  persist();
  renderAll();
  // 추가 후 입력칸에 포커스 유지
  setTimeout(()=>{
    const input=document.getElementById('proc-add-'+si);
    if(input)input.focus();
  },50);
}
function deleteSiteProc(si,pi){
  if(S.sites[si].procs.length<=1){alert('작업은 최소 1개 이상 필요합니다.');return;}
  if(!confirm(`"${S.sites[si].procs[pi]}" 공정을 삭제하면 해당 공정의 모든 기록이 지워집니다.`))return;
  const cells=S.sites[si].cells;
  const nc={};
  Object.entries(cells).forEach(([k,v])=>{
    const p=k.split('_');
    // 키 형식: si_pi_year_month_day
    const ci=parseInt(p[1]);
    if(ci===pi)return;
    if(ci>pi) nc[p[0]+'_'+(ci-1)+'_'+p[2]+'_'+p[3]+'_'+p[4]]=v;
    else nc[k]=v;
  });
  S.sites[si].cells=nc;
  S.sites[si].procs.splice(pi,1);
  persist();renderAll();
}
function moveSiteProc(si,pi,dir){
  const ni=pi+dir;
  const procs=S.sites[si].procs;
  if(ni<0||ni>=procs.length)return;
  [procs[pi],procs[ni]]=[procs[ni],procs[pi]];
  const cells=S.sites[si].cells;
  const nc={};
  Object.entries(cells).forEach(([k,v])=>{
    const p=k.split('_');
    const ci=parseInt(p[1]);
    const nci=ci===pi?ni:ci===ni?pi:ci;
    nc[p[0]+'_'+nci+'_'+p[2]+'_'+p[3]+'_'+p[4]]=v;
  });
  S.sites[si].cells=nc;
  persist();renderAll();
}

  id text primary key default 'main',

alter table gongjeong enable row level security;

create policy "anyone can update" on gongjeong for update using (true);`;
  navigator.clipboard.writeText(sql).then(()=>{
    const btn=document.querySelector('[onclick="copySql()"]');
    if(btn){btn.textContent='복사됨 ✓';btn.style.background='#538135';}
  });
}

async function connectSupabase(){
  const url=document.getElementById('sb-url').value.trim();
  const key=document.getElementById('sb-key').value.trim();
  const errEl=document.getElementById('connect-error');
  errEl.style.display='none';
  if(!url||!key){errEl.textContent='URL과 키를 모두 입력해 주세요';errEl.style.display='block';return;}
  if(!url.startsWith('https://')){errEl.textContent='URL은 https:// 로 시작해야 해요';errEl.style.display='block';return;}
  if(!key.startsWith('eyJ')){errEl.textContent='키는 eyJ 로 시작하는 긴 문자열이에요';errEl.style.display='block';return;}

  const btn=document.querySelector('[onclick="connectSupabase()"]');
  btn.textContent='연결 확인 중...';btn.disabled=true;

  try{
    const res=await fetch(`${url}/rest/v1/gongjeong?id=eq.main&select=id`,{
      headers:{'apikey':key,'Authorization':'Bearer '+key}
    });
    if(!res.ok)throw new Error('연결 실패');
    // 저장
    localStorage.setItem('gj_sb_url',url);
    localStorage.setItem('gj_sb_key',key);
    SUPABASE_URL=url;
    SUPABASE_KEY=key;
    btn.textContent='연결 성공! 시작합니다...';
    btn.style.background='#538135';
    setTimeout(async()=>{
      showApp();
      renderAll();
      await startupLoad();
    },800);
  }catch(e){
    btn.textContent='연결하고 시작하기 →';btn.disabled=false;
    errEl.textContent='연결에 실패했어요. URL과 키를 다시 확인해 주세요';
    errEl.style.display='block';
  }
}

// ── 이전 키 형식(si_pi_d) 데이터 초기화 함수
function migrateOrReset(p){
  if(!p||!p.sites)return false;
  let hasOldFormat=false;
  p.sites.forEach(s=>{
    Object.keys(s.cells).forEach(k=>{
      const parts=k.split('_');
      // 새 형식: si_pi_year_month_day (5개), 이전 형식: si_pi_day (3개)
      if(parts.length===3)hasOldFormat=true;
    });
  });
  if(hasOldFormat){
    // 이전 형식 데이터 전부 초기화
    p.sites.forEach(s=>{s.cells={};});
  }
  return true;
}
async function startupLoad(){
  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),5000);
    setSyncStatus('ing','서버 연결 중...');
    const res=await fetch(`${SUPABASE_URL}/rest/v1/gongjeong?id=eq.main&select=data`,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},
      signal:controller.signal
    });
    clearTimeout(timeout);
    const rows=await res.json();
    if(rows&&rows[0]&&rows[0].data&&Object.keys(rows[0].data).length>0){
      const p=rows[0].data;
      migrateOrReset(p);
      if(p.sites){
        const currentTab=S.tab;
        Object.assign(S,p);
        S.tab=currentTab;
        S.sites.forEach(s=>{
          if(!s.memo)s.memo='';if(!s.checklist)s.checklist=[];
          if(!s.procs||!s.procs.length)s.procs=[...DEFAULT_PROCS];
          if(!s.newProcName)s.newProcName='';
          if(!s.selectedProcs)s.selectedProcs=[];
        });
      }
    } else {
      // 서버 데이터가 비어있으면 초기 상태로 리셋
      resetState();
      await dbSave();
    }
    setSyncStatus('ok','팀 공유 중 — 실시간 연동');
    renderAll();
    startPolling();
  }catch(e){
    if(e.name==='AbortError'){
      setSyncStatus('err','연결 시간 초과 — 오프라인 모드');
    } else {
      setSyncStatus('err','연결 실패 — 오프라인 모드');
    }
  }
}

// ── 앱 시작 ──────────────────────────────────
const saved_url=localStorage.getItem('gj_sb_url');
const saved_key=localStorage.getItem('gj_sb_key');
const local_only=localStorage.getItem('gj_local_only');
if(saved_url&&saved_key){
  SUPABASE_URL=saved_url;
  SUPABASE_KEY=saved_key;
  showApp();
  renderAll();
  startupLoad();
} else if(local_only){
  // 로컬 저장 데이터 불러오기
  try{
    const localData=localStorage.getItem('gj_local_data');
    if(localData){
      const p=JSON.parse(localData);
      if(p&&p.sites){
        Object.assign(S,p);
        S.tab='all'; // 항상 통합에서 시작
        S.sites.forEach(s=>{
          if(!s.memo)s.memo='';if(!s.checklist)s.checklist=[];
          if(!s.procs||!s.procs.length)s.procs=[...DEFAULT_PROCS];
          if(!s.newProcName)s.newProcName='';
        });
      }
    }
  }catch(e){}
  showApp();
  renderAll();
  setSyncStatus('ok','내 기기에만 저장 중');
} else {
  showOnboarding();
}
